<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resonance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-warm: #0f0e0d;
      --surface: #161514;
      --surface-hover: #1e1c1a;
      --surface-active: #252220;
      --border: #2a2725;
      --border-light: #3a3633;
      --text: #f0ebe4;
      --text-muted: #9a918a;
      --text-dim: #6b6360;
      --accent: #e8a435;
      --accent-hover: #f0b84a;
      --accent-glow: rgba(232, 164, 53, 0.15);
      --accent-subtle: rgba(232, 164, 53, 0.08);
      --rose: #c47a7a;
      --rose-subtle: rgba(196, 122, 122, 0.1);
      --purple: #b68adf;
      --purple-subtle: rgba(182, 138, 223, 0.1);
      --green: #7ac47a;
      --red: #e05555;
      --radius: 10px;
      --radius-sm: 6px;
      --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 100px;
    }

    /* ─── Header ─── */
    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg-warm);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--rose));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mode-toggle { display: flex; gap: 4px; }

    .mode-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      font-family: var(--font);
      font-weight: 500;
      transition: all 0.25s ease;
    }

    .mode-btn:hover { border-color: var(--accent); color: var(--accent); }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--accent), #d49020);
      color: #0a0a0b;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      background: var(--bg-warm);
    }

    .tab {
      padding: 12px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.25s ease;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ─── Search + Filters ─── */
    .toolbar {
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--bg-warm);
    }

    .toolbar input {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.88rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .toolbar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .genre-select {
      padding: 10px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.83rem;
      font-family: var(--font);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      max-width: 180px;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    .genre-select:focus { border-color: var(--accent); }

    .toolbar-btn {
      padding: 10px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: var(--font);
      font-weight: 500;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .toolbar-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-subtle);
      transform: translateY(-1px);
    }

    .toolbar-btn:active { transform: translateY(0); }

    .toolbar-btn.primary {
      background: linear-gradient(135deg, var(--accent), #d49020);
      color: #0a0a0b;
      border-color: var(--accent);
      font-weight: 600;
    }

    .toolbar-btn.primary:hover {
      background: linear-gradient(135deg, var(--accent-hover), var(--accent));
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    /* ─── Main Layout ─── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* ─── Track List ─── */
    .track-list { flex: 1; overflow-y: auto; padding: 4px 0; }

    .track-item {
      display: flex;
      align-items: center;
      padding: 10px 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      gap: 14px;
      border-radius: 0;
      position: relative;
    }

    .track-item:hover {
      background: linear-gradient(90deg, var(--accent-subtle) 0%, transparent 70%);
    }

    .track-item.playing {
      background: linear-gradient(90deg, var(--accent-glow) 0%, transparent 60%);
    }

    .track-item.playing::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .track-cover-wrap {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface);
    }

    .track-cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .track-cover-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #201c18 0%, #151310 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .track-cover-placeholder svg {
      width: 20px;
      height: 20px;
      opacity: 0.3;
      color: var(--accent);
    }

    .track-item .track-info { flex: 1; min-width: 0; }

    .track-item .track-title {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-item .track-artist {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .track-item .track-genre {
      font-size: 0.68rem;
      color: var(--purple);
      background: var(--purple-subtle);
      padding: 3px 8px;
      border-radius: 12px;
      white-space: nowrap;
      font-weight: 500;
    }

    .track-item .track-duration {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }

    .track-item .add-btn {
      opacity: 0;
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      transition: opacity 0.15s, transform 0.15s;
    }

    .track-item:hover .add-btn { opacity: 1; }
    .track-item .add-btn:hover { transform: scale(1.2); }

    /* ─── Queue Panel (right sidebar) ─── */
    .queue-panel {
      width: 300px;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .queue-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .queue-header h2 { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }

    .queue-actions { display: flex; gap: 6px; }

    .queue-actions button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.73rem;
      font-family: var(--font);
      padding: 4px 8px;
      border-radius: 12px;
      transition: all 0.2s;
    }

    .queue-actions button:hover { color: var(--accent); background: var(--accent-subtle); }

    .queue-list { flex: 1; overflow-y: auto; padding: 4px 0; }

    .queue-item {
      padding: 8px 16px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 4px;
      margin: 0 4px;
    }

    .queue-item:hover { background: var(--surface-hover); }
    .queue-item.current { color: var(--accent); background: var(--accent-subtle); }
    .queue-item .q-index { color: var(--text-dim); font-size: 0.7rem; width: 22px; text-align: right; font-variant-numeric: tabular-nums; }
    .queue-item .q-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ─── Playlists Panel ─── */
    .playlists-view { padding: 16px 24px; overflow-y: auto; flex: 1; }

    .playlist-card {
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .playlist-card:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
      transform: translateX(4px);
    }

    .playlist-card .pl-name { font-size: 0.9rem; font-weight: 500; }
    .playlist-card .pl-count { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    .playlist-card .pl-actions { display: flex; gap: 8px; }

    .playlist-card .pl-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      transition: all 0.15s;
    }

    .playlist-card .pl-btn:hover { color: var(--accent); background: var(--accent-subtle); }
    .playlist-card .pl-btn.del:hover { color: var(--red); background: rgba(224, 85, 85, 0.1); }

    /* ─── Create Playlist Modal ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    .modal h3 { font-size: 1.05rem; margin-bottom: 18px; font-weight: 600; }

    .modal label {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: block;
      margin-bottom: 6px;
      margin-top: 14px;
    }

    .modal input, .modal select {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }

    .modal input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .genre-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      max-height: 150px;
      overflow-y: auto;
    }

    .genre-chip {
      padding: 5px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .genre-chip:hover { border-color: var(--purple); }

    .genre-chip.selected {
      background: var(--purple);
      color: #fff;
      border-color: var(--purple);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 10px 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: var(--font);
      font-weight: 500;
      transition: all 0.2s;
    }

    .modal-actions button:hover { border-color: var(--text-muted); }

    .modal-actions button.primary {
      background: linear-gradient(135deg, var(--accent), #d49020);
      color: #0a0a0b;
      border-color: var(--accent);
      font-weight: 600;
    }

    .modal-actions button.primary:hover {
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .or-divider {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.73rem;
      margin: 14px 0;
    }

    /* ─── Player Bar ─── */
    .player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(18, 16, 14, 0.85);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-top: 1px solid rgba(232, 164, 53, 0.15);
      box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.4);
      z-index: 100;
    }

    .player-cover-wrap {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface);
    }

    .player-cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .player-cover-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #201c18 0%, #151310 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-cover-placeholder svg { width: 24px; height: 24px; opacity: 0.3; color: var(--accent); }

    .player-track-info { min-width: 0; width: 180px; }

    .player-track-info .title {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-track-info .artist {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .player-controls { display: flex; align-items: center; gap: 6px; }

    .player-controls button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: all 0.2s ease;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-controls button:hover {
      background: rgba(232, 164, 53, 0.1);
      color: var(--text);
      transform: scale(1.08);
    }

    .player-controls button:active {
      transform: scale(0.94);
    }

    .player-controls .play-btn {
      background: linear-gradient(135deg, var(--accent), #d49020);
      color: #0a0a0b;
      width: 46px;
      height: 46px;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .player-controls .play-btn:hover {
      background: linear-gradient(135deg, var(--accent-hover), var(--accent));
      color: #0a0a0b;
      box-shadow: 0 6px 24px rgba(232, 164, 53, 0.3);
    }

    .player-controls #stopBtn:hover { color: var(--red); background: rgba(224, 85, 85, 0.1); }

    .player-controls .shuffle-active { color: var(--accent); }
    .player-controls .shuffle-active:hover { background: var(--accent-subtle); }

    .progress-container { flex: 1; display: flex; align-items: center; gap: 10px; }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      transition: height 0.15s;
    }

    .progress-bar:hover { height: 8px; }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--rose));
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s linear;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .progress-bar:hover .progress-fill::after { opacity: 1; }

    .progress-time {
      font-size: 0.72rem;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      min-width: 36px;
    }

    .volume-control { display: flex; align-items: center; gap: 8px; }

    .volume-control input[type="range"] {
      width: 80px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .volume-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px var(--accent-glow);
    }

    .volume-icon { font-size: 0.9rem; color: var(--text-dim); }

    /* ─── Status dot ─── */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(122, 196, 122, 0.4);
    }

    /* ─── Track count ─── */
    .track-count { padding: 6px 24px; font-size: 0.72rem; color: var(--text-dim); }

    /* ─── Visualizer ─── */
    .viz-container {
      position: relative;
      width: 100%;
      height: 180px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: none;
    }

    .viz-container.active { display: block; }

    .viz-container canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .viz-gear {
      position: absolute;
      top: 10px;
      right: 12px;
      z-index: 10;
    }

    .viz-gear-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .viz-gear-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

    .viz-menu {
      display: none;
      position: absolute;
      top: 36px;
      right: 0;
      background: rgba(15, 14, 13, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      min-width: 140px;
      z-index: 20;
    }

    .viz-menu.open { display: block; }

    .viz-menu-item {
      padding: 8px 12px;
      font-size: 0.78rem;
      font-family: var(--font);
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.15s;
    }

    .viz-menu-item:hover { background: var(--surface-hover); color: var(--text); }
    .viz-menu-item.active { color: var(--accent); }
    .viz-menu-item.close-item { color: var(--red); margin-top: 4px; border-top: 1px solid var(--border); padding-top: 10px; }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      main { flex-direction: column; }
      .queue-panel { width: 100%; max-height: 180px; border-left: none; border-top: 1px solid var(--border); }
      .player-track-info { width: 120px; }
      .volume-control { display: none; }
      .viz-container { height: 140px; }
      .player-bar { padding: 10px 14px; gap: 10px; }
      .player-cover-wrap { width: 42px; height: 42px; }
    }
  </style>
</head>
<body>

<header>
  <div class="status-dot"></div>
  <h1>Resonance</h1>
  <div class="header-right">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="stream">Stream</button>
      <button class="mode-btn" data-mode="local">PC</button>
    </div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let tracks = [];
let allGenres = [];
let playlists = [];
// ALWAYS default to stream mode (audio plays in browser)
let state = { queue: [], currentIndex: 0, isPlaying: false, playMode: 'stream', currentTrack: null };
const audio = document.getElementById('audio');

const PLACEHOLDER_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';

// ─── WebSocket (with reconnect) ──────────────────────────────────────────────
let ws;
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(protocol + '//' + location.host);
  ws.onmessage = function(event) {
    const msg = JSON.parse(event.data);
    if (msg.type === 'state') {
      state = msg.data;
      updateUI();
      // Load new track only if:
      // 1. Server says playing
      // 2. Track changed (different from what's currently loaded)
      // 3. We're not in a playLock (user click in progress)
      if (state.isPlaying && state.currentTrack &&
          state.currentTrack.id !== currentlyLoadedId && !playLock) {
        loadAndPlay(state.currentTrack);
      }
      // If server says stopped, stop local audio too
      if (!state.isPlaying && !audio.paused && !playLock) {
        audio.pause();
      }
    }
    if (msg.type === 'library-updated') {
      fetchTracks();
      fetchGenres();
    }
  };
  ws.onclose = function() { setTimeout(connectWS, 2000); };
  ws.onerror = function() { ws.close(); };
}
connectWS();

// ─── API Helpers ─────────────────────────────────────────────────────────────
async function api(path, method, body) {
  method = method || 'GET';
  body = body || null;
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch('/api' + path, opts);
  return res.json();
}

async function fetchTracks(query, genre) {
  query = query || '';
  genre = genre || '';
  var url = '/tracks';
  var params = [];
  if (query) params.push('q=' + encodeURIComponent(query));
  if (genre) params.push('genre=' + encodeURIComponent(genre));
  if (params.length) url += '?' + params.join('&');
  tracks = await api(url);
  renderTracks();
}

async function fetchGenres() {
  allGenres = await api('/genres');
  renderGenreFilter();
}

async function fetchPlaylists() {
  playlists = await api('/playlists');
  renderPlaylists();
}

// ─── Tabs ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'playlists') fetchPlaylists();
  });
});

// ─── Cover Art Helper ────────────────────────────────────────────────────────
function coverImg(track, size) {
  size = size || 'track';
  var wrapClass = size === 'player' ? 'player-cover-wrap' : 'track-cover-wrap';
  if (!track || !track.hasCover) {
    return '<div class="' + wrapClass + '"><div class="' + (size === 'player' ? 'player-cover-placeholder' : 'track-cover-placeholder') + '">' + PLACEHOLDER_SVG + '</div></div>';
  }
  return '<div class="' + wrapClass + '"><img class="cover-img" src="/api/cover/' + track.id + '" loading="lazy" alt=""><div class="' + (size === 'player' ? 'player-cover-placeholder' : 'track-cover-placeholder') + '" style="display:none">' + PLACEHOLDER_SVG + '</div></div>';
}

// Delegated error handler for cover images (CSP blocks inline onerror)
document.addEventListener('error', function(e) {
  if (e.target.classList && e.target.classList.contains('cover-img')) {
    e.target.style.display = 'none';
    var next = e.target.nextElementSibling;
    if (next) next.style.display = 'flex';
  }
}, true);

// ─── Render Tracks ───────────────────────────────────────────────────────────
function renderTracks() {
  var list = document.getElementById('trackList');
  document.getElementById('trackCount').textContent = tracks.length + ' titre' + (tracks.length > 1 ? 's' : '');

  list.innerHTML = tracks.map(function(t) {
    return '<div class="track-item ' + (state.currentTrack && state.currentTrack.id === t.id ? 'playing' : '') + '" data-id="' + t.id + '">' +
      coverImg(t) +
      '<div class="track-info">' +
        '<div class="track-title">' + esc(t.title) + '</div>' +
        '<div class="track-artist">' + esc(t.artist) + ' — ' + esc(t.album) + '</div>' +
      '</div>' +
      (t.genre ? '<span class="track-genre">' + esc(t.genre) + '</span>' : '') +
      '<span class="track-duration">' + formatTime(t.duration) + '</span>' +
      '<button class="add-btn" data-id="' + t.id + '" title="Ajouter à la file">+</button>' +
    '</div>';
  }).join('');

  list.querySelectorAll('.track-item').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.classList.contains('add-btn')) return;
      var id = parseInt(el.dataset.id);
      playTrackById(id);
    });

    el.querySelector('.add-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      var id = parseInt(e.target.dataset.id);
      api('/queue/add', 'POST', { trackIds: [id] });
    });
  });
}

// ─── Genre Filter ────────────────────────────────────────────────────────────
function renderGenreFilter() {
  var sel = document.getElementById('genreFilter');
  sel.innerHTML = '<option value="">Tous les genres</option>' +
    allGenres.map(function(g) { return '<option value="' + esc(g) + '">' + esc(g) + '</option>'; }).join('');
}

document.getElementById('genreFilter').addEventListener('change', function(e) {
  var q = document.getElementById('search').value;
  fetchTracks(q, e.target.value);
});

// ─── Queue ───────────────────────────────────────────────────────────────────
function renderQueue() {
  var list = document.getElementById('queueList');
  if (!state.queue || state.queue.length === 0) {
    list.innerHTML = '<div style="padding: 14px; color: var(--text-dim); font-size: 0.8rem;">File vide</div>';
    return;
  }
  list.innerHTML = state.queue.map(function(t, i) {
    return '<div class="queue-item ' + (i === state.currentIndex ? 'current' : '') + '" data-index="' + i + '">' +
      '<span class="q-index">' + (i + 1) + '</span>' +
      '<span class="q-title">' + esc(t.title) + ' — ' + esc(t.artist) + '</span>' +
    '</div>';
  }).join('');

  list.querySelectorAll('.queue-item').forEach(function(el) {
    el.addEventListener('click', function() {
      api('/play', 'POST', { index: parseInt(el.dataset.index) });
    });
  });
}

// ─── Playlists ───────────────────────────────────────────────────────────────
function renderPlaylists() {
  var view = document.getElementById('playlistsView');
  if (playlists.length === 0) {
    view.innerHTML = '<p style="color: var(--text-muted); font-size: 0.85rem;">Aucune playlist. Cree-en une !</p>';
    return;
  }
  view.innerHTML = playlists.map(function(p) {
    return '<div class="playlist-card" data-id="' + p.id + '">' +
      '<div>' +
        '<div class="pl-name">' + esc(p.name) + '</div>' +
        '<div class="pl-count">' + p.trackCount + ' titre' + (p.trackCount > 1 ? 's' : '') + '</div>' +
      '</div>' +
      '<div class="pl-actions">' +
        '<button class="pl-btn play-pl" data-id="' + p.id + '" title="Play">▶</button>' +
        '<button class="pl-btn del" data-id="' + p.id + '" title="Supprimer">✕</button>' +
      '</div>' +
    '</div>';
  }).join('');

  view.querySelectorAll('.play-pl').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      api('/playlists/' + btn.dataset.id + '/play', 'POST');
    });
  });

  view.querySelectorAll('.del').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (confirm('Supprimer cette playlist ?')) {
        api('/playlists/' + btn.dataset.id, 'DELETE').then(function() { fetchPlaylists(); });
      }
    });
  });
}

// ─── Create Playlist Modal ───────────────────────────────────────────────────
var modal = document.getElementById('playlistModal');
var selectedGenres = new Set();
var useQueueForPlaylist = false;

document.getElementById('createPlaylistBtn').addEventListener('click', function() {
  modal.classList.add('open');
  selectedGenres.clear();
  useQueueForPlaylist = false;
  document.getElementById('plName').value = '';
  document.getElementById('plKeywords').value = '';
  renderGenreCheckboxes();
});

document.getElementById('plCancel').addEventListener('click', function() { modal.classList.remove('open'); });
modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('open'); });

function renderGenreCheckboxes() {
  var container = document.getElementById('genreCheckboxes');
  container.innerHTML = allGenres.map(function(g) {
    return '<div class="genre-chip" data-genre="' + esc(g) + '">' + esc(g) + '</div>';
  }).join('');

  container.querySelectorAll('.genre-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      var g = chip.dataset.genre;
      if (selectedGenres.has(g)) {
        selectedGenres.delete(g);
        chip.classList.remove('selected');
      } else {
        selectedGenres.add(g);
        chip.classList.add('selected');
      }
    });
  });
}

document.getElementById('plFromQueue').addEventListener('click', function() {
  useQueueForPlaylist = true;
  document.getElementById('plFromQueue').textContent = 'File selectionnee';
  document.getElementById('plFromQueue').style.borderColor = 'var(--green)';
  document.getElementById('plFromQueue').style.color = 'var(--green)';
});

document.getElementById('plCreate').addEventListener('click', async function() {
  var name = document.getElementById('plName').value.trim();
  if (!name) return alert('Donne un nom a ta playlist');

  var body = { name: name };

  if (useQueueForPlaylist && state.queue.length > 0) {
    body.trackIds = state.queue.map(function(t) { return t.id; });
  } else if (selectedGenres.size > 0) {
    body.genres = Array.from(selectedGenres);
  } else if (document.getElementById('plKeywords').value.trim()) {
    body.keywords = document.getElementById('plKeywords').value.trim();
  } else {
    return alert('Selectionne des genres, tape des mots-cles, ou utilise la file actuelle.');
  }

  var result = await api('/playlists', 'POST', body);
  if (result.ok) {
    modal.classList.remove('open');
    fetchPlaylists();
  } else {
    alert(result.error || 'Erreur');
  }
});

// Save current queue as playlist
document.getElementById('saveQueueBtn').addEventListener('click', function() {
  if (!state.queue || state.queue.length === 0) return alert('La file est vide');
  var name = prompt('Nom de la playlist ?');
  if (!name) return;
  api('/playlists', 'POST', { name: name, trackIds: state.queue.map(function(t) { return t.id; }) })
    .then(function(r) { if (r.ok) alert('Playlist "' + name + '" creee (' + state.queue.length + ' titres)'); });
});

// ─── Update UI ───────────────────────────────────────────────────────────────
function updateUI() {
  renderQueue();
  var track = state.currentTrack;

  // Player bar cover - fixed container, never changes height
  var coverEl = document.getElementById('playerCover');
  if (track && track.hasCover) {
    coverEl.innerHTML = '<img class="cover-img" src="/api/cover/' + track.id + '" alt=""><div class="player-cover-placeholder" style="display:none">' + PLACEHOLDER_SVG + '</div>';
  } else {
    coverEl.innerHTML = '<div class="player-cover-placeholder">' + PLACEHOLDER_SVG + '</div>';
  }

  document.getElementById('playerTitle').textContent = track ? track.title : 'Resonance';
  document.getElementById('playerArtist').textContent = track ? track.artist : 'Cliquez sur un titre pour lancer';
  document.getElementById('totalTime').textContent = track ? formatTime(track.duration) : '0:00';

  // Update play/pause icon
  var playBtnSvg = state.isPlaying
    ? '<svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M8 5v14l11-7z"/></svg>';
  document.getElementById('playPauseBtn').innerHTML = playBtnSvg;

  // Mode toggle
  document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.mode === state.playMode);
  });

  // Highlight playing track
  document.querySelectorAll('.track-item').forEach(function(el) {
    el.classList.toggle('playing', track && parseInt(el.dataset.id) === track.id);
  });
}

// ─── Audio Playback (single source of truth) ────────────────────────────────
var currentlyLoadedId = null;
var playLock = false; // prevents WebSocket from interrupting user-initiated play

function stopAudio() {
  playLock = false;
  audio.pause();
  audio.currentTime = 0;
  audio.removeAttribute('src');
  audio.load();
  currentlyLoadedId = null;
}

function playTrackById(trackId) {
  // Lock: prevent WebSocket handler from interrupting this play
  playLock = true;
  // Stop current
  audio.pause();
  audio.currentTime = 0;
  // Load and play new
  currentlyLoadedId = trackId;
  audio.src = '/api/stream/' + trackId;
  audio.load();
  audio.addEventListener('canplay', function onCanPlay() {
    audio.removeEventListener('canplay', onCanPlay);
    audio.play().then(function() {
      playLock = false;
    }).catch(function(err) {
      console.warn('[Resonance] Play error:', err.message);
      playLock = false;
    });
  });
  // Tell server (for state sync with other devices)
  api('/queue', 'POST', { trackIds: [trackId] })
    .then(function() { return api('/play', 'POST', { index: 0 }); });
}

function loadAndPlay(track) {
  if (!track) return;
  // If user just clicked play, don't interfere
  if (playLock) return;
  // Already playing this track? Do nothing.
  if (currentlyLoadedId === track.id && !audio.paused) return;
  // If same track is loaded (just paused), resume
  if (currentlyLoadedId === track.id && audio.paused) {
    audio.play().catch(function() {});
    return;
  }
  // Load and play new track
  audio.pause();
  currentlyLoadedId = track.id;
  audio.src = '/api/stream/' + track.id;
  audio.load();
  audio.addEventListener('canplay', function onCanPlay() {
    audio.removeEventListener('canplay', onCanPlay);
    audio.play().catch(function() {});
  });
}

audio.addEventListener('timeupdate', function() {
  if (!audio.duration) return;
  var pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
});

audio.addEventListener('ended', function() {
  // Track finished -> ask server for next
  api('/next', 'POST');
});

document.getElementById('progressBar').addEventListener('click', function(e) {
  if (!audio.duration) return;
  var rect = e.currentTarget.getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

// Volume
document.getElementById('volumeSlider').addEventListener('input', function(e) {
  audio.volume = parseFloat(e.target.value);
});

// ─── Controls ────────────────────────────────────────────────────────────────
document.getElementById('playPauseBtn').addEventListener('click', function() {
  if (!audio.paused) {
    // Currently playing -> pause
    audio.pause();
    api('/pause', 'POST');
  } else if (currentlyLoadedId != null) {
    // Paused with a loaded track -> resume
    audio.play().catch(function() {});
    api('/play', 'POST');
  }
});

document.getElementById('nextBtn').addEventListener('click', function() {
  audio.pause();
  audio.currentTime = 0;
  api('/next', 'POST');
});

document.getElementById('prevBtn').addEventListener('click', function() {
  audio.pause();
  audio.currentTime = 0;
  api('/prev', 'POST');
});

document.getElementById('stopBtn').addEventListener('click', function() {
  stopAudio();
  api('/pause', 'POST');
  api('/queue', 'POST', { trackIds: [] });
});

document.getElementById('shuffleQueue').addEventListener('click', function() { api('/shuffle', 'POST'); });
document.getElementById('clearQueue').addEventListener('click', function() {
  stopAudio();
  api('/queue', 'POST', { trackIds: [] });
});

// ─── Play button = Shuffle All + Play (like Windows Media Player) ────────────
document.getElementById('playAll').addEventListener('click', function() {
  if (tracks.length === 0) return;
  var ids = tracks.map(function(t) { return t.id; });
  // Shuffle locally before sending to server (pick random first track)
  for (var i = ids.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = ids[i]; ids[i] = ids[j]; ids[j] = tmp;
  }
  var firstId = ids[0];
  // Play first shuffled track immediately (user gesture context)
  playLock = true;
  audio.pause();
  audio.currentTime = 0;
  currentlyLoadedId = firstId;
  audio.src = '/api/stream/' + firstId;
  audio.load();
  audio.addEventListener('canplay', function onCanPlay() {
    audio.removeEventListener('canplay', onCanPlay);
    audio.play().then(function() {
      playLock = false;
    }).catch(function(err) {
      console.warn('[Resonance] Play error:', err.message);
      playLock = false;
    });
  });
  // Set shuffled queue on server
  api('/queue', 'POST', { trackIds: ids }).then(function() {
    api('/play', 'POST', { index: 0 });
  });
});

// Shuffle button in player bar — reshuffle current queue
document.getElementById('shuffleBtn').addEventListener('click', function() {
  api('/shuffle', 'POST');
});

// Mode toggle
document.querySelectorAll('.mode-btn').forEach(function(btn) {
  btn.addEventListener('click', function() { api('/mode', 'POST', { mode: btn.dataset.mode }); });
});

// Search (debounced)
var searchTimeout;
document.getElementById('search').addEventListener('input', function(e) {
  clearTimeout(searchTimeout);
  var genre = document.getElementById('genreFilter').value;
  searchTimeout = setTimeout(function() { fetchTracks(e.target.value, genre); }, 300);
});

// ─── Helpers ─────────────────────────────────────────────────────────────────
function formatTime(secs) {
  if (!secs || isNaN(secs)) return '0:00';
  var m = Math.floor(secs / 60);
  var s = Math.floor(secs % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function esc(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ─── Keyboard shortcuts ──────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('playPauseBtn').click(); }
  if (e.code === 'ArrowRight') api('/next', 'POST');
  if (e.code === 'ArrowLeft') api('/prev', 'POST');
  if (e.code === 'KeyV') toggleViz();
});

// ─── Visualizer ──────────────────────────────────────────────────────────────
var vizContainer = document.getElementById('vizContainer');
var vizCanvas = document.getElementById('vizCanvas');
var viz = null;
var vizInitialized = false;
var vizVisible = true; // Active by default
var vizMode = 'starfield'; // Default mode

function initViz() {
  if (vizInitialized) return;
  viz = new Visualizer(vizCanvas, audio);
  viz.setMode(vizMode);
  viz.initAudio();
  vizInitialized = true;
  viz.start();
}

function toggleViz() {
  vizVisible = !vizVisible;
  vizContainer.classList.toggle('active', vizVisible);
  if (vizVisible) {
    if (!vizInitialized) initViz();
    viz.resize();
    viz.start();
  } else {
    if (viz) viz.stop();
  }
}

// Gear menu toggle
var vizMenu = document.getElementById('vizMenu');
document.getElementById('vizGearBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  vizMenu.classList.toggle('open');
});

// Close menu on click outside
document.addEventListener('click', function() { vizMenu.classList.remove('open'); });

// Viz mode items
document.querySelectorAll('.viz-menu-item[data-viz]').forEach(function(item) {
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    vizMode = item.dataset.viz;
    if (viz) viz.setMode(vizMode);
    document.querySelectorAll('.viz-menu-item[data-viz]').forEach(function(i) { i.classList.remove('active'); });
    item.classList.add('active');
    vizMenu.classList.remove('open');
  });
});

// Close visualizer from menu
document.getElementById('vizCloseItem').addEventListener('click', function(e) {
  e.stopPropagation();
  vizMenu.classList.remove('open');
  toggleViz();
});

// Toggle button in player bar (reopen)
document.getElementById('vizToggleBtn').addEventListener('click', toggleViz);

// Auto-init visualizer on first play (needs user gesture for AudioContext)
audio.addEventListener('play', function() {
  if (!vizInitialized) initViz();
  if (vizVisible && viz) viz.start();
}, { once: true });

// ─── Init ────────────────────────────────────────────────────────────────────
fetchTracks();
fetchGenres();
// Force stream mode on server (audio plays in browser)
api('/mode', 'POST', { mode: 'stream' });
</script>
</body>
</html>
