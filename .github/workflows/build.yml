name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.yml
            dist/*.yaml
          body: |
            ## Resonance ${{ github.ref_name }}

            ### Download
            Download `Resonance-Setup-*.exe` below and run the installer.

            ### What's new
            See [commit history](https://github.com/n3lio/Resonance/commits/${{ github.ref_name }}) for changes.

            ---
            *Auto-built from tag `${{ github.ref_name }}`*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
